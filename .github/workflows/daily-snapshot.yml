name: Daily Snapshot

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 09:00 UTC Mon–Fri (adjust to taste)
  workflow_dispatch:          # manual trigger from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Run snapshot
        env:
          LUCID_API_KEY: ${{ secrets.LUCID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.SNAPSHOTS_GITHUB_TOKEN }}
        run: |
          npx lucid-history snapshot <your-lucid-doc-id> \
            --repo <your-org>/<your-snapshots-repo> \
            --skip-renders
