name: Daily Snapshot

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 09:00 UTC Mon–Fri (adjust to taste)
  workflow_dispatch:          # manual trigger from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lucid-history
        run: npm install github:lhamoudi/lucid-history

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Run snapshots
        env:
          LUCID_API_KEY: ${{ secrets.LUCID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.SNAPSHOTS_GITHUB_TOKEN }}
        run: |
          for id in $(jq -r '.[].id' docs.json); do
            npx lucid-history snapshot "$id" --repo <your-org>/<your-snapshots-repo> --lucid-folder <your-automated-snapshots-folder-id> --auto-merge
          done

      - name: Update Confluence
        env:
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          CONFLUENCE_PARENT_ID: ${{ vars.CONFLUENCE_PARENT_ID }}
        run: |
          if [ -z "$CONFLUENCE_TOKEN" ] || [ -z "$CONFLUENCE_PARENT_ID" ]; then
            echo "CONFLUENCE_TOKEN or CONFLUENCE_PARENT_ID not set — skipping Confluence update"
            exit 0
          fi
          git pull origin main
          npx lucid-history confluence-update \
            --local . \
            --repo <your-org>/<your-snapshots-repo> \
            --confluence-url https://<your-org>.atlassian.net \
            --confluence-email <your-email> \
            --confluence-token "$CONFLUENCE_TOKEN" \
            --confluence-space <your-space-key> \
            --confluence-parent "$CONFLUENCE_PARENT_ID"
