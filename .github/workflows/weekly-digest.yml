name: Weekly Digest

on:
  schedule:
    - cron: '0 9 * * 1'    # Monday 09:00 UTC — recap of the previous week (adjust to taste)
  workflow_dispatch:
    inputs:
      week:
        description: 'Any date in the week to digest (YYYY-MM-DD, default: last week)'
        required: false
        type: string

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SNAPSHOTS_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lucid-history
        run: npm install github:lhamoudi/lucid-history

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Send weekly digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          CONFLUENCE_PARENT_ID: ${{ vars.CONFLUENCE_PARENT_ID }}
        run: |
          # Default to last week so Monday morning recaps the previous Mon–Sun
          WEEK="${{ inputs.week }}"
          if [ -z "$WEEK" ]; then
            WEEK=$(date -d "7 days ago" +%Y-%m-%d)
          fi
          MONDAY=$(date -d "$WEEK - $(date -d $WEEK +%u) days + 1 day" +%Y-%m-%d)
          OUT="digests/${MONDAY}.md"

          ARGS=(
            --local .
            --repo "${{ github.repository }}"
            --out "$OUT"
            --week "$WEEK"
          )

          [ -n "$SLACK_WEBHOOK_URL" ] && ARGS+=(--slack-webhook "$SLACK_WEBHOOK_URL")

          if [ -n "$CONFLUENCE_TOKEN" ] && [ -n "$CONFLUENCE_PARENT_ID" ]; then
            ARGS+=(
              --confluence-url https://<your-org>.atlassian.net
              --confluence-email <your-email>
              --confluence-token "$CONFLUENCE_TOKEN"
              --confluence-space <your-space-key>
              --confluence-parent "$CONFLUENCE_PARENT_ID"
            )
          fi

          npx lucid-history weekly-digest "${ARGS[@]}"

          if git diff --quiet "$OUT" 2>/dev/null && git ls-files --error-unmatch "$OUT" 2>/dev/null; then
            echo "Digest unchanged — nothing to commit."
          else
            git add "$OUT"
            git commit -m "chore: weekly digest ${MONDAY}"
            git push
          fi
