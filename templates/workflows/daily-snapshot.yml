name: Daily Snapshot

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 09:00 UTC Mon–Fri (adjust to taste)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SNAPSHOTS_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install lucid-history
        run: npm install github:lhamoudi/lucid-history

      - name: Configure git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Run snapshots
        env:
          LUCID_API_KEY: ${{ secrets.LUCID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.SNAPSHOTS_GITHUB_TOKEN }}
          LUCID_FOLDER_ID: ${{ vars.LUCID_FOLDER_ID }}
        run: |
          FOLDER_FLAG=""
          [ -n "$LUCID_FOLDER_ID" ] && FOLDER_FLAG="--lucid-folder $LUCID_FOLDER_ID"
          for id in $(jq -r '.[].id' docs.json); do
            npx lucid-history snapshot "$id" \
              --repo "${{ github.repository }}" \
              --auto-merge \
              $FOLDER_FLAG
          done

      - name: Update Confluence
        env:
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          CONFLUENCE_URL: ${{ vars.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
          CONFLUENCE_SPACE: ${{ vars.CONFLUENCE_SPACE }}
          CONFLUENCE_PARENT_ID: ${{ vars.CONFLUENCE_PARENT_ID }}
        run: |
          if [ -z "$CONFLUENCE_TOKEN" ] || [ -z "$CONFLUENCE_PARENT_ID" ]; then
            echo "CONFLUENCE_TOKEN or CONFLUENCE_PARENT_ID not set — skipping"
            exit 0
          fi
          git pull origin main
          npx lucid-history confluence-update \
            --local . \
            --repo "${{ github.repository }}" \
            --confluence-url "$CONFLUENCE_URL" \
            --confluence-email "$CONFLUENCE_EMAIL" \
            --confluence-token "$CONFLUENCE_TOKEN" \
            --confluence-space "$CONFLUENCE_SPACE" \
            --confluence-parent "$CONFLUENCE_PARENT_ID"
